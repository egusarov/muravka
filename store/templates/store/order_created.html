{% extends 'store/base_store.html' %}

{% block content %}

    <div class="order-created-page"
         data-transaction-id="{{ order.id }}"
         data-total="{{ order.get_total_cost|floatformat:2 }}"
         data-utm-source="{{ request.session.utm_source|default:'direct' }}"
         data-utm-medium="{{ request.session.utm_medium|default:'none' }}"
         data-utm-campaign="{{ request.session.utm_campaign|default:'none' }}">

        <h2>Дякуємо!</h2>
        <p>Ваше замовлення №{{ order.id }} успішно створено.</p>

        <a href="{% url 'store:product_list' %}">До магазину</a>

        <ul hidden>
            {% for item in order.items.all %}
                <li class="purchase-item"
                    data-product-id="{{ item.product.id }}"
                    data-product-name="{{ item.product.name }}"
                    data-product-price="{{ item.price|floatformat:2 }}"
                    data-product-quantity="{{ item.quantity }}">
                </li>
            {% endfor %}
        </ul>

    </div>

{% endblock %}
