{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Muravka-krem{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/base.css' %}" rel="stylesheet">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <link id="favicon" rel="icon" type="image/png" href="{% static 'img/favicon-light.png' %}">

    <script>
    (function () {
        const darkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const favicon = document.getElementById('favicon');

        if (darkMode) {
            favicon.href = "{% static 'img/favicon-dark.png' %}";
        } else {
            favicon.href = "{% static 'img/favicon-light.png' %}";
        }
    })();
    </script>
</head>

<body class="d-flex flex-column min-vh-100">

    {% include "store/includes/header.html" %}

    <main class="flex-grow-1">
        <div class="container mt-4">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    {% include "store/includes/footer.html" %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
