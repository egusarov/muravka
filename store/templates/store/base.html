{% load static %}

<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}Muravka-krem{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}Натуральна косметика ручної роботи Muravka-krem{% endblock %}">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/base.css' %}" rel="stylesheet">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">

    <!-- Favicon -->
    <link id="favicon" rel="icon" type="image/png" href="{% static 'img/favicon-light.png' %}">

    <script>
        const darkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;

        document.addEventListener('DOMContentLoaded', () => {
            const favicon = document.getElementById('favicon');
            if (!favicon) return;

            favicon.href = darkMode
                ? "{% static 'img/favicon-dark.png' %}"
                : "{% static 'img/favicon-light.png' %}";
        });
    </script>

    <!-- GA -->
    {% if GA_MEASUREMENT_ID %}
        <script async src="https://www.googletagmanager.com/gtag/js?id={{ GA_MEASUREMENT_ID }}"></script>
        <script>
            window.dataLayer = window.dataLayer || [];

            function gtag() {
                dataLayer.push(arguments);
            }

            gtag('js', new Date());

            gtag('config', '{{ GA_MEASUREMENT_ID }}');
        </script>
    {% endif %}

    {% block extra_head %}{% endblock %}
</head>

<body class="{% block body_class %}{% endblock %}">

{% block layout %}{% endblock %}

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

{% block scripts %}{% endblock %}
</body>
</html>
