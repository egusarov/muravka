{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Muravka{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100">

    <header class="border-bottom py-3 site-header">
        <div class="container">
            <div class="row align-items-center">

                <div class="col-md-3">
                    <a href="{% url 'store:product_list' %}" class="text-decoration-none">
                        <div>
                            <h1 class="h4 mb-0 logo-title">Muravka 🐜</h1>
                            <small class="text-muted">Натуральна домашня косметика</small>
                        </div>
                    </a>
                </div>

                <div class="col-md-6">
                    <form method="get" action="" class="d-flex">
                        <input type="text"
                               name="q"
                               placeholder="Пошук..."
                               value="{{ query|default:'' }}"
                               class="form-control me-2">
                        <button type="submit" class="btn btn-outline-secondary">
                            Знайти
                        </button>
                    </form>
                </div>

                <div class="col-md-3 text-end">
                    <a href="/cart/" class="btn btn-custom position-relative">
                        🛒 Кошик
                        {% if cart|length > 0 %}
                            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                                {{ cart|length }}
                            </span>
                        {% endif %}
                    </a>
                </div>

            </div>
        </div>
    </header>

    <main class="flex-grow-1">
        <div class="container mt-4">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    <footer class="bg-light border-top mt-auto">
        <div class="container py-3 text-center text-muted">
            © 2026 Muravka · Всі права захищені
        </div>
    </footer>

</body>
</html>
