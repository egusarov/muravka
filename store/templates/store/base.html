{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Muravka{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100">

    <header class="border-bottom py-3">
        <div class="container d-flex align-items-center gap-3">

            <div>
                <h1 class="h4 mb-0">Muravka 🐜</h1>
                <small class="text-muted">Натуральна домашня косметика</small>
            </div>

            <form method="get" action="" class="flex-grow-1">
                <div class="input-group">
                    <input type="text" name="q" class="form-control" placeholder="Пошук..." value="{{ query|default:'' }}">
                    <button class="btn btn-outline-secondary" type="submit">Знайти</button>
                </div>
            </form>

            <a href="/cart/" class="btn btn-primary">
                🛒 Кошик
            </a>

        </div>
    </header>

    <main class="flex-grow-1">
        <div class="container mt-4">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    <footer class="bg-light border-top mt-auto">
        <div class="container py-3 text-center text-muted">
            © 2026 Muravka · Всі права захищені
        </div>
    </footer>

</body>
</html>
