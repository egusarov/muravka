<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Muravka{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100">

    <!-- HEADER -->
    <header class="border-bottom py-3">
        <div class="container d-flex align-items-center">
            <div>
                <h1 class="h4 mb-0">Muravka 🐜</h1>
                <small class="text-muted">Натуральна домашня косметика</small>
            </div>

            <form method="get" action="">
                <input type="text" name="q" placeholder="Пошук..." value="{{ query|default:'' }}">
                <button type="submit">Знайти</button>
            </form>

            <a href="/cart/" class="btn btn-primary ms-auto">
                🛒 Кошик
            </a>
        </div>
    </header>

    <!-- MAIN -->
    <main class="flex-grow-1">
        <div class="container py-4">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="bg-light border-top mt-auto">
        <div class="container py-3 text-center text-muted">
            © 2026 Muravka · Всі права захищені
        </div>
    </footer>

</body>
</html>
