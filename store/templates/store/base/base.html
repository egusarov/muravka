{% load static %}

<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="index, follow">

    <title>{% block title %}Muravka-krem{% endblock %}</title>
    <meta name="description"
          content="{% block meta_description %}Натуральна косметика ручної роботи Muravka-krem{% endblock %}">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Caveat:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/base.css' %}" rel="stylesheet">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'img/favicon/favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'img/favicon/favicon-16x16.png' %}">
    <link rel="icon" href="{% static 'img/favicon/favicon.ico' %}">

    <link rel="apple-touch-icon" sizes="180x180"
          href="{% static 'img/favicon/apple-touch-icon.png' %}">

    <link rel="manifest" href="{% static 'img/favicon/site.webmanifest' %}">

    <!-- GA -->
    {% if GA_MEASUREMENT_ID %}
        <script async src="https://www.googletagmanager.com/gtag/js?id={{ GA_MEASUREMENT_ID }}"></script>
        <script>
            window.dataLayer = window.dataLayer || [];

            function gtag() {
                dataLayer.push(arguments);
            }

            window.gtag = gtag;

            gtag('js', new Date());
            gtag('config', '{{ GA_MEASUREMENT_ID }}');
        </script>
    {% endif %}

    {% block extra_head %}{% endblock %}
</head>

<body class="{% block body_class %}{% endblock %}">

{% block layout %}{% endblock %}

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>

<!-- Analytics (global) -->
<script src="{% static 'js/analytics.js' %}" defer></script>
<script src="{% static 'js/tracking-init.js' %}" defer></script>

{% block scripts %}{% endblock %}
</body>
</html>
